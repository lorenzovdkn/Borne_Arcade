# Configuration de la Borne d'Arcade
# Modes disponibles: PRODUCTION, DEVELOPPEMENT (ou DEV)

# Mode par défaut de l'application
# PRODUCTION : Pour utilisation sur la borne (jeu uniquement)
# DEVELOPPEMENT : Avec outils IA pour génération de documentation
mode=PRODUCTION

# Options pour le mode développement
dev.ai.enabled=false
dev.ai.auto_generate_doc=true
dev.doc.enabled=true
dev.doc.interactive=true
dev.doc.apply=false
dev.doc.output_dir=src/docs/generated

# Options pour le mode production
prod.fullscreen=true
prod.debug=false
